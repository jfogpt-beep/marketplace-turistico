name: Database Migrations (D1)

on:
  push:
    branches: [main, develop]
    paths:
      - 'api/drizzle/migrations/**'
      - 'api/drizzle/schema.ts'
      - '.github/workflows/db-migrate.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to migrate'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod
      dry_run:
        description: 'Dry run (no aplicar)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '22'

jobs:
  migrate:
    name: Apply D1 Migrations
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate migration (if schema changed)
        run: npm run db:generate

      - name: List pending migrations
        run: |
          cd api
          wrangler d1 migrations list "marketplace-db-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}" --env ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply migrations
        if: ${{ !github.event.inputs.dry_run }}
        run: |
          cd api
          wrangler d1 migrations apply "marketplace-db-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}" --env ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOFLARE_ACCOUNT_ID }}

      - name: Verify migrations
        if: ${{ !github.event.inputs.dry_run }}
        run: |
          cd api
          wrangler d1 migrations list "marketplace-db-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}" --env ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
