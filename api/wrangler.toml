name = "marketplace-turistico-api"
main = "src/index.ts"
compatibility_date = "2025-03-27"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "marketplace-turistico-db"
database_id = "00000000-0000-0000-0000-000000000000"

# KV Namespaces
[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "00000000000000000000000000000000"

# R2 Buckets
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "marketplace-turistico-assets"

# Vectorize Index
[[vectorize_indexes]]
binding = "VECTORIZE_INDEX"
index_name = "listings-search"

# Queue
[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "email-queue"

[[queues.consumers]]
queue = "email-queue"
max_batch_size = 10
max_batch_timeout = 30

# AI Binding
[ai]
binding = "AI"

# Environment Variables
[vars]
ENVIRONMENT = "production"

# Secrets (set via wrangler secret put)
# JWT_SECRET
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY

# Observability
[observability]
enabled = true
head_sampling_rate = 1

# Dev settings
[dev]
port = 8787
