name = "marketplace-turistico-api"
main = "src/index.ts"
compatibility_date = "2025-03-27"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "marketplace-turistico-db"
database_id = "64302b83-263a-47e4-97df-8313ba8d79a3"

# KV Namespaces
[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "9c167b53c8194a9e9cbe72daab0a6882"

# R2 Buckets (deshabilitado temporalmente)
# [[r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "marketplace-turistico-assets"

# Vectorize Index
[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "listings-semantic-prod"

# Queue (deshabilitado temporalmente)
# [[queues.producers]]
# binding = "EMAIL_QUEUE"
# queue = "email-queue"

# AI Binding
[ai]
binding = "AI"

# Environment Variables
[vars]
ENVIRONMENT = "production"

# Secrets (set via wrangler secret put)
# JWT_SECRET
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY

# Observability
[observability]
enabled = true
head_sampling_rate = 1

# Dev settings
[dev]
port = 8787
